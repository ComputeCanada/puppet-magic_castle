name: Test complete puppet environment

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
      - name: Install incus
        run: |
          sudo apt update
          sudo apt install incus
      - name: Init incus
        run: |
          sudo incus admin init --auto
          sudo chgrp runner /var/lib/incus/unix.socket
      - name: Reset the firewall
        run: |
          sudo nft flush ruleset
      - name: Download Magic Castle Incus
        run: |
          curl -L -O https://raw.githubusercontent.com/ComputeCanada/magic_castle/refs/heads/main/examples/incus/main.tf
          curl -L -O https://raw.githubusercontent.com/ComputeCanada/magic_castle/refs/heads/main/examples/incus/data.yaml
      - name: Init and apply
        id: create_cluster
        run: |
          sed -i "s;\"main\";\"${GITHUB_REF}\";" main.tf
          terraform init
          # enable security nesting to allow NFS related mount
          cd .terraform/modules/incus/
          cat << EOF | git apply -
          diff --git a/incus/infrastructure.tf b/incus/infrastructure.tf
          index 5ad78c8..a3f916a 100644
          --- a/incus/infrastructure.tf
          +++ b/incus/infrastructure.tf
          @@ -91,6 +91,7 @@ resource "incus_instance" "instances" {
             config = {
               "cloud-init.user-data" = module.configuration.user_data[each.key]
               "security.privileged"  = var.privileged
          +     "security.nesting"  = true
             }

             device {
          EOF
          cd ../../../
          terraform apply -auto-approve
          echo "incus_project=$(terraform output | grep -Po 'project = "\K[^"]+')">> "$GITHUB_OUTPUT"
      - name: Wait for puppet catalog to be applied
        continue-on-error: true
        timeout-minutes: 20
        run: |
          incus project switch ${{ steps.create_cluster.outputs.incus_project }}
          for nodename in $(incus list -c n -f csv); do
            echo -n "${nodename}: "
            until incus exec $nodename -- journalctl -u puppet | grep "Applied catalog"; do
              sleep 10
            done
            echo
          done
      - name: Verify Puppet Prometheus report for errors
        run: |
          SUCCESSFUL=0
          incus project switch ${{ steps.create_cluster.outputs.incus_project }}
          exec >> $GITHUB_STEP_SUMMARY
          for nodename in $(incus list -c n -f csv); do
            echo -n "### ${nodename}" 
            failures=$(incus exec mgmt1 -- cat /var/lib/node_exporter/puppet_report_${nodename}.prom | grep 'name="Failure"' | cut -d' ' -f2)
            if (( $failures > 0 )); then
              echo " FAILED"
              cat << EOF
              #### failures
              <details>
              ```
              $(incus exec $nodename -- journalctl -u puppet -p3..4 | grep -i -v -P '(connection|routes|wrapped)')
              ```
              </details>
              EOF
              SUCCESSFUL=1
            else
              echo
            fi

            cat << EOF
            #### successes
            <details>
            ```
            $(incus exec $nodename -- journalctl -u puppet -p5..5)
            ```
            </details>
            EOF

            cat << EOF
            #### Puppet report"
            <details>
            ```
            $(incus exec mgmt1 -- cat /var/lib/node_exporter/puppet_report_${nodename}.prom | grep '^puppet_report')
            ```
            </details>
            EOF
          done
          exit $SUCCESSFUL
